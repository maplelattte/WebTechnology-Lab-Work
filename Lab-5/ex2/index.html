<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Book Tracker (XML)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 30px; background-color: #f4f7f6; }
        .flex-container { display: flex; gap: 30px; }
        .form-section { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 320px; }
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        .status-available { color: #27ae60; font-weight: bold; }
        .status-borrowed { color: #e67e22; font-weight: bold; }
        .btn { padding: 6px 12px; cursor: pointer; border: none; border-radius: 4px; }
        .btn-update { background: #3498db; color: white; }
        .btn-delete { background: #e74c3c; color: white; }
    </style>
</head>
<body>

    <h2>Library Book Tracker</h2>

    <div class="flex-container">
        <div class="form-section">
            <h3>Add New Book</h3>
            <input type="text" id="bookId" placeholder="Book ID (e.g. B003)" style="width:90%; margin-bottom:10px;"><br>
            <input type="text" id="bookTitle" placeholder="Title" style="width:90%; margin-bottom:10px;"><br>
            <input type="text" id="bookAuthor" placeholder="Author" style="width:90%; margin-bottom:10px;"><br>
            <select id="bookStatus" style="width:96%; margin-bottom:10px; padding: 5px;">
                <option value="Available">Available</option>
                <option value="Borrowed">Borrowed</option>
            </select><br>
            <button onclick="addBook()" style="width:100%; padding: 10px; background:#2c3e50; color:white; border:none; border-radius:4px; cursor:pointer;">Add to Library</button>
        </div>

        <div style="flex-grow: 1;">
            <table id="bookTable">
                <thead>
                    <tr>
                        <th>ID</th><th>Title</th><th>Author</th><th>Status</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let xmlDoc = null;

        // LOAD: AJAX GET request for XML
        function loadLibrary() {
            const xhr = new XMLHttpRequest();
            xhr.open("GET", "books.xml", true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    xmlDoc = xhr.responseXML;
                    renderTable();
                }
            };
            xhr.send();
        }

        // READ: Dynamically refresh table
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";
            const books = xmlDoc.getElementsByTagName("book");

            for (let i = 0; i < books.length; i++) {
                const id = getVal(books[i], "id");
                const title = getVal(books[i], "title");
                const author = getVal(books[i], "author");
                const status = getVal(books[i], "status");

                const row = `<tr>
                    <td>${id}</td>
                    <td>${title}</td>
                    <td>${author}</td>
                    <td class="${status === 'Available' ? 'status-available' : 'status-borrowed'}">${status}</td>
                    <td>
                        <button class="btn btn-update" onclick="toggleStatus('${id}')">Toggle Status</button>
                        <button class="btn btn-delete" onclick="deleteBook('${id}')">Delete</button>
                    </td>
                </tr>`;
                tbody.innerHTML += row;
            }
        }

        // CREATE: Add new <book> node
        function addBook() {
            const id = document.getElementById('bookId').value.trim();
            const title = document.getElementById('bookTitle').value.trim();
            const author = document.getElementById('bookAuthor').value.trim();
            const status = document.getElementById('bookStatus').value;

            // Validation
            if (!id || !title || !author) {
                alert("Please fill in all fields.");
                return;
            }

            const newBook = xmlDoc.createElement("book");
            newBook.appendChild(createNode("id", id));
            newBook.appendChild(createNode("title", title));
            newBook.appendChild(createNode("author", author));
            newBook.appendChild(createNode("status", status));

            xmlDoc.documentElement.appendChild(newBook);
            renderTable();
            clearForm();
        }

        // UPDATE: Update availability status
        function toggleStatus(id) {
            const books = xmlDoc.getElementsByTagName("book");
            for (let i = 0; i < books.length; i++) {
                if (getVal(books[i], "id") === id) {
                    const statusNode = books[i].getElementsByTagName("status")[0].childNodes[0];
                    statusNode.nodeValue = (statusNode.nodeValue === "Available") ? "Borrowed" : "Available";
                    break;
                }
            }
            renderTable();
        }

        // DELETE: Remove book entry
        function deleteBook(id) {
            const books = xmlDoc.getElementsByTagName("book");
            for (let i = 0; i < books.length; i++) {
                if (getVal(books[i], "id") === id) {
                    xmlDoc.documentElement.removeChild(books[i]);
                    break;
                }
            }
            renderTable();
        }

        // Helpers
        function getVal(parent, tag) {
            return parent.getElementsByTagName(tag)[0].childNodes[0].nodeValue;
        }

        function createNode(tag, text) {
            const node = xmlDoc.createElement(tag);
            node.appendChild(xmlDoc.createTextNode(text));
            return node;
        }

        function clearForm() {
            document.getElementById('bookId').value = "";
            document.getElementById('bookTitle').value = "";
            document.getElementById('bookAuthor').value = "";
        }

        // Initialize
        loadLibrary();
    </script>
</body>
</html>
