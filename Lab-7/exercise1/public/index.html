<!DOCTYPE html>
<html>

<head>
    <title>Student Notes Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>Student Notes Manager</h1>

<div id="notes"></div>

<script src="script.js"></script>

</body>
</html>
