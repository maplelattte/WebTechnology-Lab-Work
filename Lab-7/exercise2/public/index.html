<!DOCTYPE html>
<html>

<head>

<title>Online Book Finder</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<h1>📚 Online Book Finder</h1>

<!-- Search Books -->
<div>
<h2>Search Book by Title</h2>

<input 
type="text" 
id="searchTitle" 
placeholder="Enter book title">

<button onclick="searchBooks()">Search</button>

</div>

<hr>


<!-- Filter Category -->
<div>

<h2>Filter by Category</h2>

<input 
type="text" 
id="categoryInput" 
placeholder="Enter category (Programming, AI, etc.)">

<button onclick="filterCategory()">Filter</button>

</div>

<hr>


<!-- Sort -->
<div>

<h2>Sort Books</h2>

<button onclick="sortPrice()">Sort by Price</button>

<button onclick="sortRating()">Sort by Rating</button>

</div>

<hr>


<!-- Top Rated -->
<div>

<h2>Top Rated Books</h2>

<button onclick="topBooks()">Show Top Rated</button>

</div>

<hr>


<!-- Pagination -->
<div>

<h2>Pagination</h2>

<button onclick="loadMore()">Load More Books</button>

</div>

<hr>


<!-- Display Books -->

<div id="books"></div>


<script src="script.js"></script>

</body>

</html>
