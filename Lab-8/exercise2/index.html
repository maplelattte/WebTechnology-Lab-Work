<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ES6 Student Info - Lab 8</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #f9f9f9;
      color: #333;
      margin: 0;
      padding: 40px 20px;
      line-height: 1.6;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 30px;
      font-size: 1.8rem;
    }

    .section {
      margin-bottom: 25px;
    }

    .label {
      font-weight: bold;
      color: #34495e;
      display: inline-block;
      width: 110px;
    }

    .value {
      color: #2c3e50;
    }

    pre {
      background: #f4f4f4;
      padding: 15px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 0.95rem;
      margin: 10px 0 0 0;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Student Information</h1>

    <div class="section">
      <h3>Extracted Values:</h3>
      <p><span class="label">ID:</span> <span class="value" id="id">--</span></p>
      <p><span class="label">Name:</span> <span class="value" id="name">--</span></p>
      <p><span class="label">Department:</span> <span class="value" id="dept">--</span></p>
      <p><span class="label">Marks:</span> <span class="value" id="marks">--</span></p>
    </div>

    <div class="section">
      <h3>Updated Student Object:</h3>
      <pre id="updated"></pre>
    </div>
  </div>

  <script>
    const student = {
      id: 191,
      name: "Aviral",
      department: "CSE",
      marks: 92
    };

    const { id, name, department, marks } = student;

    document.getElementById("id").textContent = id;
    document.getElementById("name").textContent = name;
    document.getElementById("dept").textContent = department;
    document.getElementById("marks").textContent = marks;

    const updatedStudent = {
      ...student,
      grade: "A"
    };

    document.getElementById("updated").textContent = JSON.stringify(updatedStudent, null, 2);
  </script>

</body>
</html>
