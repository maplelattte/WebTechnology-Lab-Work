<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real-Time Registration</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .form-group { margin-bottom: 15px; position: relative; }
        #feedback { font-size: 0.9em; margin-top: 5px; font-weight: bold; }
        .success { color: green; }
        .error { color: red; }
        .loading { color: gray; font-style: italic; }
        input[disabled] { background-color: #eee; }
    </style>
</head>
<body>

    <h2>Create an Account</h2>
    <form id="registrationForm">
        <div class="form-group">
            <label for="username">Username:</label><br>
            <input type="text" id="username" placeholder="Enter username" required>
            <div id="feedback"></div>
        </div>
        <button type="submit" id="submitBtn">Register</button>
    </form>

    <script>
        const usernameInput = document.getElementById('username');
        const feedback = document.getElementById('feedback');
        const submitBtn = document.getElementById('submitBtn');
        const form = document.getElementById('registrationForm');

        let isUsernameAvailable = false;

        usernameInput.addEventListener('input', async (e) => {
            const username = e.target.value.trim().toLowerCase();

            // Clear feedback if input is empty
            if (!username) {
                feedback.textContent = "";
                submitBtn.disabled = false;
                return;
            }

            // Show loading indicator
            feedback.textContent = "Checking availability...";
            feedback.className = "loading";
            submitBtn.disabled = true;

            try {
                // Simulate network delay for effect
                await new Promise(resolve => setTimeout(resolve, 500));

                const response = await fetch('users.json');
                const data = await response.json();
                
                if (data.takenUsernames.includes(username)) {
                    feedback.textContent = "✖ Username already taken";
                    feedback.className = "error";
                    isUsernameAvailable = false;
                } else {
                    feedback.textContent = "✔ Username available";
                    feedback.className = "success";
                    isUsernameAvailable = true;
                }
            } catch (error) {
                feedback.textContent = "Error connecting to validation service.";
                feedback.className = "error";
            } finally {
                // Only re-enable button if username is actually available
                submitBtn.disabled = !isUsernameAvailable;
            }
        });

        // Final submission guard
        form.addEventListener('submit', (e) => {
            if (!isUsernameAvailable) {
                e.preventDefault();
                alert("Please choose a valid username first.");
            } else {
                alert("Registration successful!");
            }
        });
    </script>
</body>
</html>
