<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Management System (AJAX CRUD)</title>
    <style>
        body { font-family: sans-serif; margin: 30px; line-height: 1.6; }
        .container { display: flex; gap: 40px; }
        form { background: #f4f4f4; padding: 20px; border-radius: 8px; width: 300px; height: fit-content; }
        input, select { width: 100%; padding: 8px; margin: 8px 0; box-sizing: border-box; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #007bff; color: white; }
        .btn { padding: 8px 12px; cursor: pointer; border: none; border-radius: 4px; }
        .btn-add { background: #28a745; color: white; width: 100%; }
        .btn-edit { background: #ffc107; margin-right: 5px; }
        .btn-delete { background: #dc3545; color: white; }
        #msg { padding: 10px; margin-bottom: 10px; border-radius: 4px; display: none; }
        .success { background: #d4edda; color: #155724; display: block !important; }
        .error { background: #f8d7da; color: #721c24; display: block !important; }
    </style>
</head>
<body>

    <h2>Student Management System</h2>
    <div id="msg"></div>

    <div class="container">
        <form id="studentForm">
            <input type="hidden" id="editId">
            <label>Student ID</label>
            <input type="text" id="stuId" required>
            <label>Name</label>
            <input type="text" id="stuName" required>
            <label>Department</label>
            <input type="text" id="stuDept" required>
            <label>Marks</label>
            <input type="number" id="stuMarks" required>
            <button type="submit" id="submitBtn" class="btn btn-add">Add Student</button>
        </form>

        <div style="flex-grow: 1;">
            <table id="studentTable">
                <thead>
                    <tr>
                        | ID | Name | Dept | Marks | Actions |
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
    <script>
        // Simulated Database
        let students = [
            { id: "S101", name: "Alice Smith", dept: "CS", marks: 85 },
            { id: "S102", name: "Bob Jones", dept: "Math", marks: 92 }
        ];

        const form = document.getElementById('studentForm');
        const tableBody = document.getElementById('tableBody');
        const msgDiv = document.getElementById('msg');

        // --- READ: Fetch and Display ---
        function renderTable() {
            tableBody.innerHTML = '';
            students.forEach((s, index) => {
                tableBody.innerHTML += `
                    <tr>
                        <td>${s.id}</td>
                        <td>${s.name}</td>
                        <td>${s.dept}</td>
                        <td>${s.marks}</td>
                        <td>
                            <button class="btn btn-edit" onclick="editStudent('${s.id}')">Edit</button>
                            <button class="btn btn-delete" onclick="deleteStudent('${s.id}')">Delete</button>
                        </td>
                    </tr>
                `;
            });
        }

        // --- CREATE / UPDATE Logic ---
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const studentData = {
                id: document.getElementById('stuId').value,
                name: document.getElementById('stuName').value,
                dept: document.getElementById('stuDept').value,
                marks: document.getElementById('stuMarks').value
            };

            const editId = document.getElementById('editId').value;

            try {
                // Simulating an AJAX call with a Promise
                const response = await simulateAjaxCall(editId ? 'PUT' : 'POST', studentData);
                
                if (response.status === 200) {
                    if (editId) {
                        // Update existing
                        const idx = students.findIndex(s => s.id === editId);
                        students[idx] = studentData;
                        showMsg("Student updated successfully!", "success");
                    } else {
                        // Add new
                        students.push(studentData);
                        showMsg("Student added successfully!", "success");
                    }
                    form.reset();
                    document.getElementById('editId').value = '';
                    document.getElementById('submitBtn').textContent = 'Add Student';
                    renderTable();
                }
            } catch (err) {
                showMsg(err.message, "error");
            }
        });

        // --- DELETE Logic ---
        async function deleteStudent(id) {
            if (!confirm("Are you sure?")) return;
            
            try {
                const response = await simulateAjaxCall('DELETE', id);
                if (response.status === 200) {
                    students = students.filter(s => s.id !== id);
                    renderTable();
                    showMsg("Student deleted.", "success");
                }
            } catch (err) {
                showMsg("Failed to delete.", "error");
            }
        }

        // --- EDIT Logic (Populate Form) ---
        function editStudent(id) {
            const s = students.find(stu => stu.id === id);
            if (s) {
                document.getElementById('stuId').value = s.id;
                document.getElementById('stuName').value = s.name;
                document.getElementById('stuDept').value = s.dept;
                document.getElementById('stuMarks').value = s.marks;
                document.getElementById('editId').value = s.id;
                document.getElementById('submitBtn').textContent = 'Update Student';
            }
        }

        // --- HELPER: Simulate AJAX & HTTP Statuses ---
        function simulateAjaxCall(method, data) {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    // Simulate a 404 if data is missing
                    if (!data) return reject({ status: 404, message: "Resource not found" });
                    // Simulate a 500 if server "crashes" (randomly)
                    if (Math.random() < 0.01) return reject({ status: 500, message: "Server Error" });
                    
                    resolve({ status: 200 });
                }, 400);
            });
        }

        function showMsg(text, type) {
            msgDiv.textContent = text;
            msgDiv.className = type;
            setTimeout(() => msgDiv.className = '', 3000);
        }

        // Initial Load
        renderTable();
    </script>
</body>
</html>
