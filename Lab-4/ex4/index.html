<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJAX Weather Dashboard</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
        }
        .card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            width: 100%;
            max-width: 400px; 
            text-align: center; 
        }
        h2 { color: #1e293b; margin-bottom: 1.5rem; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { 
            flex: 1;
            padding: 12px; 
            border: 2px solid #e2e8f0; 
            border-radius: 8px; 
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #3b82f6; }
        button { 
            padding: 12px 20px; 
            background: #3b82f6; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background: #2563eb; }
        
        /* Loading Spinner */
        #loader { 
            display: none; 
            margin: 20px auto; 
            border: 4px solid #f3f3f3; 
            border-top: 4px solid #3b82f6; 
            border-radius: 50%; 
            width: 35px; 
            height: 35px; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .weather-info { 
            margin-top: 20px; 
            padding-top: 20px;
            border-top: 1px solid #f1f5f9;
            display: none; 
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .temp { font-size: 3rem; font-weight: bold; color: #1e293b; margin: 10px 0; }
        .details { color: #64748b; display: flex; justify-content: space-around; }
        .error { color: #ef4444; margin-top: 15px; font-weight: 500; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="card">
    <h2>Weather Dashboard</h2>
    <div class="search-box">
        <input type="text" id="cityInput" placeholder="Enter city name...">
        <button onclick="getWeather()">Search</button>
    </div>

    <div id="loader"></div>
    <div id="errorMsg" class="error"></div>

    <div id="weatherResult" class="weather-info">
        <h3 id="resCity" style="margin: 0; color: #334155;"></h3>
        <div id="resCond" style="text-transform: capitalize; color: #64748b;"></div>
        <div class="temp"><span id="resTemp"></span>°C</div>
        <div class="details">
            <span><strong>Humidity:</strong> <span id="resHum"></span>%</span>
        </div>
    </div>
</div>

<script>
    // Configuration
    const API_KEY = 'b1fd6e14799699504191b6bdbcadfc35'; 
    let lastSearchCache = null; // Requirement: Cache variable

    async function getWeather() {
        const cityInput = document.getElementById('cityInput');
        const city = cityInput.value.trim();
        const loader = document.getElementById('loader');
        const resultDiv = document.getElementById('weatherResult');
        const errorMsg = document.getElementById('errorMsg');

        if (!city) return;

        // 1. Check Cache (Requirement: Use the cached variable)
        if (lastSearchCache && lastSearchCache.name.toLowerCase() === city.toLowerCase()) {
            console.log("Serving from Cache:", city);
            displayData(lastSearchCache);
            return;
        }

        // Reset UI for new request
        errorMsg.textContent = "";
        resultDiv.style.display = "none";
        loader.style.display = "block";

        try {
            // 2. AJAX GET Request using Fetch
            const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`;
            const response = await fetch(url);
            
            // 3. Proper HTTP status handling
            if (!response.ok) {
                if (response.status === 404) throw new Error("City not found. Please check the spelling.");
                if (response.status === 401) throw new Error("API Key is still activating. Try again in a few minutes.");
                throw new Error("Could not fetch data. Please try again later.");
            }

            const data = await response.json();
            
            // 4. Update Cache
            lastSearchCache = data;
            
            // 5. Update UI Dynamically
            displayData(data);

        } catch (err) {
            errorMsg.textContent = err.message;
        } finally {
            loader.style.display = "none";
        }
    }

    // Helper function to update DOM
    function displayData(data) {
        const resultDiv = document.getElementById('weatherResult');
        document.getElementById('resCity').textContent = data.name;
        document.getElementById('resTemp').textContent = Math.round(data.main.temp);
        document.getElementById('resHum').textContent = data.main.humidity;
        document.getElementById('resCond').textContent = data.weather[0].description;
        
        resultDiv.style.display = "block";
    }

    // Allow "Enter" key to trigger search
    document.getElementById('cityInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') getWeather();
    });
</script>

</body>
</html>
